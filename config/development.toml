[database]
url = "postgres://aust:aust_dev_password@localhost/aust_backend"

[storage]
provider = "s3"
bucket = "aust-uploads"
endpoint = "http://localhost:9000"
region = "us-east-1"

[llm]
default_provider = "ollama"

[llm.ollama]
base_url = "https://ollama.com"
model = "qwen3.5:397b"
# Set via AUST__LLM__OLLAMA__API_KEY env var
api_key = ""

[email]
# Set via AUST__EMAIL__* env vars
imap_host = "imap.example.com"
imap_port = 993
smtp_host = "smtp.example.com"
smtp_port = 587
username = ""
password = ""
poll_interval_secs = 30
from_address = "umzug@example.com"
from_name = "AUST Umzüge"
