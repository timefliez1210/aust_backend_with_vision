# Production configuration
# Override these values using environment variables:
# AUST__DATABASE__URL, AUST__LLM__CLAUDE__API_KEY, etc.

[server]
host = "0.0.0.0"
port = 8080

[database]
max_connections = 20

[storage]
provider = "s3"
region = "eu-central-1"

[llm]
default_provider = "claude"

[llm.claude]
model = "claude-sonnet-4-20250514"
