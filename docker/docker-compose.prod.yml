services:
  postgres:
    image: postgres:16-alpine
    container_name: aust_postgres
    restart: always
    environment:
      POSTGRES_USER: aust
      POSTGRES_PASSWORD: aust_dev_password
      POSTGRES_DB: aust_backend
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aust -d aust_backend"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aust_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/aust-uploads --ignore-existing;
      mc anonymous set download local/aust-uploads;
      exit 0;
      "

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: aust_backend
    restart: always
    env_file:
      - path: /opt/aust/.env
        required: true
    environment:
      RUN_MODE: production
      # Override .env localhost values — inside the container, sibling services are reachable by compose service name
      AUST__DATABASE__URL: postgres://aust:aust_dev_password@postgres:5432/aust_backend
      AUST__STORAGE__ENDPOINT: http://minio:9000
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/aust/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  minio_data:
