services:
  postgres:
    image: postgres:16-alpine
    container_name: aust_postgres
    restart: always
    environment:
      POSTGRES_USER: aust
      POSTGRES_PASSWORD: aust_dev_password
      POSTGRES_DB: aust_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aust -d aust_backend"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aust_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/aust-uploads --ignore-existing;
      mc anonymous set download local/aust-uploads;
      exit 0;
      "

  vision:
    build:
      context: ../services/vision
      dockerfile: Dockerfile.cpu
    container_name: aust_vision
    environment:
      VISION_S3_ENDPOINT: "http://minio:9000"
      VISION_DEVICE: cpu
    ports:
      - "8090:8090"
    volumes:
      - vision_weights:/app/weights
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  minio_data:
  vision_weights:
